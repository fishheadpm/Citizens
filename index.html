<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公民 学習アプリ</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<div class="container">
  <h1>公民 学習アプリ</h1>

  <div id="seriesScreen">
    <h2>章を選択</h2>
    <div id="seriesButtons"></div>
  </div>

  <div id="menuScreen" class="hidden">
    <h2 id="roundTitle"></h2>
    <button onclick="start('self')">最初から（自己申告）</button>
    <button onclick="continueGame('self')">続きから（自己申告）</button>
    <button onclick="start('input')">最初から（入力あり）</button>
    <button onclick="continueGame('input')">続きから（入力あり）</button>
    <button onclick="showHistory()">間違えた履歴表示</button>
    <button onclick="reset()" class="danger">履歴リセット</button>
    <button onclick="back()">戻る</button>
  </div>

  <div id="quizScreen" class="hidden">
    <p id="progress"></p>
    <p class="caption">次の説明にあてはまる用語を答える</p>
    <h2 id="question"></h2>
    <input id="input" placeholder="用語を入力">
    <button onclick="showAnswer()">答え表示</button>
    <div id="answerArea" class="hidden">
      <p class="answerLabel">答え</p>
      <p id="answer"></p>
      <button onclick="correct()">正解</button>
      <button onclick="wrong()">間違い</button>
    </div>
    <button onclick="show('menuScreen')" class="sub">メニューへ戻る</button>
  </div>
</div>
<script src="app.js?v=2"></script>
</body>
</html>
